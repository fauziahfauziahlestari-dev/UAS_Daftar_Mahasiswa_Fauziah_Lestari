<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mahasiswa Baru</title>
    <!-- Hubungkan ke CSS Lokal -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <!-- Form Pendaftaran -->
        <div id="form-container">
            <h2>Form Pendaftaran Mahasiswa Baru</h2>
            <form id="registration-form"
      action="tampilan.php"
      method="POST"
      enctype="multipart/form-data"
      novalidate>
                
                <div class="form-group">
                    <label for="nim">NIM</label>
                    <input type="text" id="nim" name="nim">
                    <div class="error-message" id="error-nim"></div>
                </div>

                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama">
                    <div class="error-message" id="error-nama"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                    <div class="error-message" id="error-email"></div>
                </div>

                <div class="form-group">
                    <label for="hp">Nomor HP</label>
                    <input type="text" id="hp" name="hp">
                    <div class="error-message" id="error-hp"></div>
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Laki-laki"> Laki-laki</label>
                        <label><input type="radio" name="gender" value="Perempuan"> Perempuan</label>
                    </div>
                    <div class="error-message" id="error-gender"></div>
                </div>

                <div class="form-group">
                    <label for="prodi">Program Studi</label>
                     <select id="prodi" name="prodi">
                        <option value="">-- Pilih Program Studi --</option>
                        <option value="Teknik Informatika">Teknik Informatika</option>
                        <option value="Sistem Informasi">Sistem Informasi</option>
                        <option value="Manajemen Informatika">Manajemen Informatika</option>
                    </select>
                    <div class="error-message" id="error-prodi"></div>
                </div>

                <div class="form-group">
                    <label for="alamat">Alamat</label>
                    <textarea id="alamat" name="alamat" rows="3"></textarea>
                    <div class="error-message" id="error-alamat"></div>
                </div>

                <!-- Bagian Upload Foto Sesuai Screenshot 2026-06-23 232258.png -->
                <div class="upload-section">
                    <h3>Upload Foto</h3>
                    <div class="upload-box">
                        <div class="upload-input-wrapper">
                            <label class="custom-label">Pas Foto (JPG/JPEG/PNG Maks 2MB)</label>
                            <input type="file"
       id="pas-foto"
       name="pas_foto"
       accept=".jpg,.jpeg,.png">
                        </div>
                        <div class="preview-wrapper">
                            <!-- Placeholder Foto Default -->
                            <div id="photo-preview" class="photo-preview">
                                <svg width="60" height="60" viewBox="0 0 24 24" fill="#b0b0b0">
                                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="error-message" id="error-foto"></div>
                </div>

                <div class="button-group">
                    <button type="submit" id="btn-submit" class="btn btn-primary">Daftar Sekarang</button>
                    <button type="button" id="btn-reset" class="btn btn-secondary">Reset</button>
                </div>
            </form>
        </div>

        <!-- Kartu Ringkasan Data Mahasiswa (Hidden by Default) -->
        <div id="summary-card" class="card" style="display: none;">
            <h2>Kartu Ringkasan Mahasiswa</h2>
            <div class="card-content">
                <div class="card-photo">
                    <img id="card-img" src="" alt="Foto Mahasiswa">
                </div>
                <div class="card-details">
                    <p><strong>NIM:</strong> <span id="view-nim"></span></p>
                    <p><strong>Nama Lengkap:</strong> <span id="view-nama"></span></p>
                    <p><strong>Email:</strong> <span id="view-email"></span></p>
                    <p><strong>Nomor HP:</strong> <span id="view-hp"></span></p>
                    <p><strong>Jenis Kelamin:</strong> <span id="view-gender"></span></p>
                    <p><strong>Program Studi:</strong> <span id="view-prodi"></span></p>
                    <p><strong>Alamat:</strong> <span id="view-alamat"></span></p>
                </div>
            </div>
            <hr>
            <button type="button" id="btn-edit" class="btn btn-warning">Edit Data</button>
        </div>
    </div>

    <!-- Hubungkan ke jQuery Lokal -->
    <script src="js/jquery.3.7.1.min.js"></script>
    <!-- Hubungkan ke Script JS Proyek -->
    <script src="js/script.js"></script>
</body>
</html>
